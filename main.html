<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Video Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 <div class="player">
  <video class="viewer" src="download.mp4"></video>
  <div class="player__controls">
    <button class="player__button toggle" title="Toggle Play">►</button>
    <button data-skip="-10">« 10s</button>
    <button data-skip="25">25s »</button>
    <input type="range" name="volume" min="0" max="1" step="0.1" value="0.5" class="player__slider">
    <input type="range" name="playbackRate" min="0.5" max="2" step="0.1" value="1" class="player__slider">
    <div class="progress">
      <div class="progress__filled"></div>
    </div>
  </div>
</div>

  <script src="./scripts.js"></script>
</body>
</html>
